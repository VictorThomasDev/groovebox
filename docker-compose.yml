services:
  postgres:
    image: postgres:16-alpine
    container_name: groovebox-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-groovebox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-groovebox}
      POSTGRES_DB: ${POSTGRES_DB:-groovebox}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-groovebox}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
